name: Deploy Credit Risk Analysis to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  AZURE_RESOURCE_GROUP: rg-credit-risk-analysis-prod-ukwest
  AZURE_LOCATION: ukwest
  PYTHON_VERSION: '3.11'
  APP_SERVICE_NAME: credit-risk-analysis-prod-app-25h2ya

jobs:
  # Application Testing
  test-application:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run tests
      run: |
        # Run configuration tests
        python -c "
        import sys
        sys.path.insert(0, '.')
        from app.utils.config_manager import ConfigManager
        config = ConfigManager()
        print('✅ Configuration manager works')
        "
        
        # Test import structure
        python -c "
        import sys
        sys.path.insert(0, '.')
        from app.agents.sector_classification_agent import SectorClassificationAgent
        from app.apis.unified_api_service import get_unified_api_service
        print('✅ All imports successful')
        "

  # Application Deployment
  deploy-application:
    needs: [test-application]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      shell: bash
      run: |
        echo "Skipping Azure login for now - using manual deployment"
        echo "This will be updated once Service Principal is configured"

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: Prepare deployment package
      run: |
        # Create deployment directory
        mkdir -p deployment
        
        # Copy application files
        cp -r app/ deployment/
        cp requirements.txt deployment/
        cp main.py deployment/
        
        # Create startup script for Azure App Service
        cat > deployment/startup.sh << 'EOF'
        #!/bin/bash
        echo "🚀 Starting Credit Risk Analysis Application..."
        
        # Install dependencies
        echo "📦 Installing Python dependencies..."
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
        # Set Python path
        export PYTHONPATH="/home/site/wwwroot:$PYTHONPATH"
        
        # Start Streamlit app
        echo "🌐 Starting Streamlit application..."
        python -m streamlit run app/core/streamlit_app_langgraph_viz.py \
          --server.port=8000 \
          --server.address=0.0.0.0 \
          --server.headless=true \
          --server.enableCORS=false \
          --server.enableXsrfProtection=false \
          --browser.gatherUsageStats=false
        EOF
        
        chmod +x deployment/startup.sh
        
        # Create .deployment file for Azure App Service
        cat > deployment/.deployment << 'EOF'
        [config]
        command = bash startup.sh
        EOF

    - name: Verify Deployment Package
      run: |
        echo "✅ Deployment package prepared successfully"
        echo "📦 Package contents:"
        ls -la deployment/
        echo "🔧 Startup script:"
        cat deployment/startup.sh
        echo "📋 Deployment configuration:"
        cat deployment/.deployment
        echo "⚠️  Azure deployment skipped - Service Principal needs to be configured"
            WEBSITES_PORT=8000 \
            SCM_DO_BUILD_DURING_DEPLOYMENT=true \
    - name: Build Summary
      run: |
        echo "🎯 Credit Risk Analysis - Build Complete!"
        echo "📊 Application Status: Ready for deployment"
        echo "🔧 Infrastructure Status: Already deployed"
        echo "🔑 Authentication Status: Pending Service Principal setup"
        echo ""
        echo "📋 Next Steps:"
        echo "1. Configure Azure Service Principal for GitHub Actions"
        echo "2. Add AZURE_CREDENTIALS secret to GitHub repository" 
        echo "3. Re-run workflow for automatic deployment"
        echo ""
        echo "🌐 Manual Deployment Available At:"
        echo "   App Service: https://credit-risk-analysis-prod-app-25h2ya.azurewebsites.net"
        echo "   Resource Group: rg-credit-risk-analysis-prod-ukwest"
        
        echo "🚀 Deployment completed!"
        echo "🌐 Application URL: $APP_URL"
        echo "📊 Databricks: https://dbc-beccfe71-12b6.cloud.databricks.com"
        echo "🔐 Key Vault: craprodkv25h2ya"

